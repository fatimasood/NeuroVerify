# Trustify Configuration File

model:
  # Text encoder
  vocab_size: 10000
  text_embedding_dim: 100
  lstm_hidden_dim: 128
  lstm_num_layers: 2
  
  # Image encoder
  gnn_hidden_dim: 256
  transformer_heads: 8
  transformer_layers: 3
  
  # General
  dropout: 0.3

training:
  batch_size: 20
  epochs: 20
  learning_rate: 0.005
  gradient_threshold: 1.0
  learn_rate_drop_factor: 0.2
  scheduler_step: 5
  
  # Early stopping
  early_stopping_patience: 5

data:
  image_size: 224
  max_text_length: 512
  
  # Data splits
  train_split: 0.8
  val_split: 0.1
  test_split: 0.1

device:
  cuda: true
  device_id: 0
  num_workers: 0

datasets:
  - twitter
  - buzzfeed
  - politifact

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - auc_roc